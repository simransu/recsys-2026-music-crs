lm_type: "Qwen/Qwen3-8B"
retrieval_type: "multi_source"
test_dataset_name: "talkpl-ai/TalkPlayData-Challenge-Dataset"
item_db_name: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
user_db_name: "talkpl-ai/TalkPlayData-Challenge-User-Metadata"
track_split_types:
  - "all_tracks"
user_split_types:
  - "all_users"
corpus_types:
  - "track_name"
  - "artist_name"
  - "album_name"
  - "release_date"
  - "tag_list"
cache_dir: "./cache"
device: "cuda"
retrieval_device: "cuda"
attn_implementation: "flash_attention_2"
bm25_field_weights:
  track_name: 4
  artist_name: 3
  album_name: 2
  release_date: 1
  tag_list: 1
dense_model_name: "BAAI/bge-small-en-v1.5"
dense_query_prefix: "Represent this sentence: "
dense_doc_prefix: ""
retrieval_bm25_topk: 200
retrieval_bert_topk: 200
retrieval_topk: 200
retrieval_rrf_k: 60
retrieval_bm25_weight: 0.5
retrieval_bert_weight: 0.3
retrieval_bpr_weight: 0.2
enable_query_rewrite: true
enable_specificity_routing: false
enable_user_to_item: true
enable_seen_track_blocking: true
enable_metadata_filtering: true
enable_item_to_item: true
retrieval_i2i_weight: 0.15
enable_artist_shortcut: true
artist_shortcut_weight: 1.5
artist_shortcut_min_count: 1
i2i_embedding_types:
  - "image-siglip2"
  - "cf-bpr"
  - "audio-laion_clap"
  - "attributes-qwen3_embedding_0.6b"
  - "lyrics-qwen3_embedding_0.6b"
  - "metadata-qwen3_embedding_0.6b"
i2i_embedding_weights:
  image-siglip2: 0.35
  cf-bpr: 0.30
  audio-laion_clap: 0.25
  attributes-qwen3_embedding_0.6b: 0.30
  lyrics-qwen3_embedding_0.6b: 0.20
  metadata-qwen3_embedding_0.6b: 0.20
enable_llm_query_planning: false
metadata_filter_min_pool: 200
llm_query_plan_max_new_tokens: 256
llm_query_plan_mode: "replace"
enable_album_shortcut: true
album_shortcut_weight: 1.0
enable_entity_matching: true
entity_matching_weight: 0.8
enable_lambdarank: false
lambdarank_model_path: "./cache/lambdarank_model.txt"
enable_train_thought_bm25: true
train_thought_bm25_weight: 0.4
enable_session_cooccurrence: true
session_cooccurrence_weight: 0.3
enable_qwen3_dense: true
qwen3_dense_weight: 0.5
qwen3_dense_model_name: "Qwen/Qwen3-Embedding-0.6B"
qwen3_dense_embedding_types:
  - "attributes-qwen3_embedding_0.6b"
qwen3_dense_embedding_weights:
  attributes-qwen3_embedding_0.6b: 1.0
qwen3_embedding_query_batch_size: 512
