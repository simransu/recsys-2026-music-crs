lm_type: "Qwen/Qwen3-8B"
retrieval_type: "hybrid"
reranker_type: "two_tower"
reranker_embedding_type: "cf-bpr"
reranker_checkpoint_path: "./cache/two_tower_reranker.pt"
reranker_projection_dim: 256
reranker_tower_hidden_dim: 512
reranker_dropout: 0.1
reranker_temperature: 0.07
retrieval_topk: 100
rerank_topk: 20
test_dataset_name: "talkpl-ai/TalkPlayData-Challenge-Dataset"
item_db_name: "talkpl-ai/TalkPlayData-Challenge-Track-Metadata"
user_db_name: "talkpl-ai/TalkPlayData-Challenge-User-Metadata"
track_split_types:
  - "all_tracks"
user_split_types:
  - "all_users"
corpus_types:
  - "track_name"
  - "artist_name"
  - "album_name"
  - "release_date"
  - "tag_list"
cache_dir: "./cache"
device: "cuda"
attn_implementation: "flash_attention_2"
retrieval_bm25_topk: 200
retrieval_bert_topk: 100
retrieval_final_topk: 100
retrieval_rrf_k: 80
retrieval_bm25_weight: 0.6
retrieval_bert_weight: 0.4
bm25_field_weights:
  track_name: 4
  artist_name: 3
  album_name: 2
  release_date: 1
  tag_list: 1
enable_query_rewrite: true
enable_specificity_routing: true
enable_user_to_item: true
